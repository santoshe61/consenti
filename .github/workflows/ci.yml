name: CI

on:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx turbo typecheck

      - name: Lint
        run: npx turbo lint

      - name: Build
        run: npx turbo build

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high --workspaces
