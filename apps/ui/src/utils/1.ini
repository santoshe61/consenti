---
Implementation Notes

- deepMerge is already imported in consenti-setup.ts from '../utils/locale' — reuse it for setConfig and setProfile.
- DeepPartial<T> is defined in packages/types/src/utils.ts and already used in ConsentiConfig.profileOverride.
- applyDarkMode() and applyTheme() are already private methods — no new logic, just make them reachable from the new public methods.
- For setProfile, the "resolved base" must be stored separately from this.profile so we can re-merge cleanly. Currently this.profile is the post-merge result. Safest approach: store the raw resolved profile in a new private field private resolvedBase: ResolvedProfile | null = null and assign it in init() just before the deepMerge step.
- All 7 methods must have an if (!isClient()) return SSR guard where they touch the DOM.

