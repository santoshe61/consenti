1. isCookieGranted(cookieId: string, requestValue: boolean): boolean | 'granted' | 'denied' | 'objected'
Why it's #1: The most common dev task is gating code on a single cookie. Today that requires widget.getConsent()?.analytics_storage === 'granted'. This makes it widget.isGranted('analytics_storage').
- Implementation: one-liner — return requestValue ? (this.getConsent()?.[cookieId] ?? false) : (this.getConsent()?.[cookieId] === 'granted' ? true : false)
- Add to ConsentiWidgetAPI interface.
                                                                                                                                                                                       
2. setDarkMode(enable?: boolean): void                                                                                                                                                
User-suggested. Toggles dark mode at runtime without re-init.
- If enable is omitted, toggle the current this.config.darkMode state.                                                                                                                                                                                 
- Updates this.config.darkMode, then calls the existing private applyDarkMode().
- Also mirrors .consenti-root--dark on #consenti-modal (same as showModal() already does).                                                                                                                                                                                 
- Add to ConsentiWidgetAPI interface.
                                                                                                                                                                                       
3. setTheme(theme: Partial<ThemeConfig>): void                                                                                                                                 
Natural complement to setDarkMode. Hot-swaps theme tokens without page reload.
- Merges theme into this.config.core.theme (shallow merge of the ThemeConfig props).                                                                                                                                                                                
- Then calls the existing private applyTheme().
- Add to ConsentiWidgetAPI interface.                                                                                                                                                                             
                                                                                                                                                                                       
4. setConfig(config: DeepPartial<ConsentiConfig>): void
User-suggested. Lets integrators adjust config at runtime (e.g. toggle API mode, change locale, update GTM ID).
- Deep-merges config into this.config using the existing deepMerge utility already imported in consenti-setup.ts.
- After merge, re-applies only the side-effects that are already safe to re-run: applyTheme() and applyDarkMode().
- Does NOT trigger a full init() re-run — that is the caller's responsibility if they need it (e.g. call setConfig({core:{locale:'fr'}}) then switchLocale('fr')).
- Add DeepPartial<ConsentiConfig> param; DeepPartial already exists in packages/types/src/utils.ts.
- Add to ConsentiWidgetAPI interface.

5. setProfile(override: DeepPartial<ResolvedProfile>): void
User-suggested. Merges a partial profile override into this.config.profileOverride and re-renders the visible UI.
- Deep-merges the incoming override into this.config.profileOverride using deepMerge.
- Re-merges the resolved profile: this.profile = deepMerge(resolvedBase, this.config.profileOverride).
- Re-renders by calling showBanner() if the banner was visible, or showModal() if the modal was open.
- The resolved base is available from this.profile (already stored); no network call needed.
- Add to ConsentiWidgetAPI interface.

